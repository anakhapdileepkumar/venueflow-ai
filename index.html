<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VenueFlow AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>VenueFlow AI</h1>
    <p>Smart Sporting Venue Assistant</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>Live Venue Status</h2>
      <div id="status-container" class="status-grid"></div>
    </section>

    <section class="card">
      <h2>Smart Assistant</h2>
      <div class="buttons">
        <button onclick="findGate()">Best Entry Gate</button>
        <button onclick="findFood()">Fastest Food</button>
        <button onclick="findWashroom()">Nearest Washroom</button>
        <button onclick="findExit()">Best Exit</button>
      </div>

      <div id="result">
        Click a button to get recommendation
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
