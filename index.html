<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VenueFlow AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>VenueFlow AI</h1>
    <p>Smart Sporting Venue Assistant</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>Live Venue Status</h2>

      <div class="status-grid">
        <div>
          <h3>Gates</h3>
          <div id="gates-container" class="inner-grid"></div>
        </div>

        <div>
          <h3>Food Stalls</h3>
          <div id="food-container" class="inner-grid"></div>
        </div>

        <div>
          <h3>Washrooms</h3>
          <div id="washroom-container" class="inner-grid"></div>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Smart Assistant</h2>

      <div class="input-group">
        <label for="user-location">Your current zone:</label>
        <select id="user-location">
          <option value="1">Zone 1</option>
          <option value="2">Zone 2</option>
          <option value="3">Zone 3</option>
          <option value="4">Zone 4</option>
        </select>
      </div>

      <div class="buttons">
        <button onclick="findGate()">Best Entry Gate</button>
        <button onclick="findFood()">Fastest Food</button>
        <button onclick="findWashroom()">Nearest Washroom</button>
        <button onclick="findExit()">Best Exit</button>
      </div>

      <div id="result">
        Select your zone and click a button to get a recommendation.
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
